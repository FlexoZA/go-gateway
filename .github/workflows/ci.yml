name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (build · vet · test · fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

  fuzz:
    name: Fuzz decoders (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Each Fuzz* target runs against its seed corpus under `go test` already (in
      # the Go job); here we also do a short active mutation pass per target to
      # hunt for new panics on the binary decoders. A found crasher fails the job.
      - name: fuzz decoders
        run: |
          set -euo pipefail
          for pkg in ./internal/fleetiger ./internal/howen ./internal/cathexis; do
            for fn in $(go test "$pkg" -list '^Fuzz' | grep '^Fuzz' || true); do
              echo "::group::$pkg $fn"
              go test "$pkg" -run='^$' -fuzz="^${fn}$" -fuzztime=30s
              echo "::endgroup::"
            done
          done

  admin:
    name: Admin (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: build
        run: npm run build

  docker:
    name: Docker images (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the images CI ships so a Dockerfile break (bad COPY, stale go.sum,
      # missing build stage, a new volume dir) fails here instead of at deploy time.
      - name: Gateway image — multi-unit
        run: docker build -f deploy/Dockerfile --build-arg UNIT=gateway -t device-gateway:ci .

      - name: Gateway image — lean single-unit (howen)
        run: docker build -f deploy/Dockerfile --build-arg UNIT=howen -t device-gateway-howen:ci .

      - name: Admin image
        run: docker build -f admin/Dockerfile -t device-gateway-admin:ci admin
