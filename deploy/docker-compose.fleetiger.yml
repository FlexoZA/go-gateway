# The FleeTiger (Concox GT06) stack. One unit type per server. GPS-only: no video,
# so there is no media port, clips volume, or MEDIA_ADVERTISE_HOST here.
#
#   docker compose -f deploy/docker-compose.fleetiger.yml --env-file deploy/.env up -d --build
services:
  postgres:
    image: postgres:16-alpine
    container_name: device-gateway-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gateway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gateway}
      - POSTGRES_DB=${POSTGRES_DB:-gateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  fleetiger:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        UNIT: fleetiger
    image: device-gateway-fleetiger:latest
    container_name: device-gateway-fleetiger
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GATEWAY=${GATEWAY:-dfm-gw1.cwe.cloud}
      - LISTEN_HOST=0.0.0.0
      # GT06 devices dial out to this TCP port. 8050 matches the original gateway's
      # FleeTiger port; set it to whatever the fleet is configured for.
      - LISTEN_PORT=${LISTEN_PORT:-8050}
      # Management/control HTTP API (API-key protected). 0 disables.
      - HTTP_PORT=${HTTP_PORT:-8080}
      # Shared secret the admin panel uses to authenticate (works before any DB
      # API key exists). Same value as the admin's GATEWAY_API_TOKEN.
      - INTERNAL_API_TOKEN=${ADMIN_API_TOKEN:-}
      # Telemetry sink: the universal-JSON endpoint that stores all GPS/event data.
      - DEVICE_WEBHOOK_URL=${DEVICE_WEBHOOK_URL:-http://gateway.acmtrack.net:8080/universal/gps/json/}
      # Gateway's own DB — device-verification registry (NOT telemetry).
      - DATABASE_URL=postgres://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway}@postgres:5432/${POSTGRES_DB:-gateway}?sslmode=disable
      # allow_all | postgres (defaults to postgres when DATABASE_URL is set)
      - DEVICE_AUTH_MODE=${DEVICE_AUTH_MODE:-postgres}
      # true = quarantine + reject unknown serials (require approval, default);
      # false = auto-provision + admit
      - DEVICE_REJECT_UNKNOWN=${DEVICE_REJECT_UNKNOWN:-true}
      - MAPPING_REFRESH_SECONDS=${MAPPING_REFRESH_SECONDS:-60}
      # Device local-clock offset from UTC. GT06 sends wall-clock with no timezone;
      # set 2 if the unit reports SAST local time, 0 if it already sends UTC.
      - DEVICE_TZ_OFFSET=${DEVICE_TZ_OFFSET:-0}
      # Set DEBUG=1 (or DEBUG=tcp/fleetiger) for verbose per-frame logging.
      - DEBUG=${DEBUG:-}
    ports:
      - "${LISTEN_PORT:-8050}:${LISTEN_PORT:-8050}"
      - "8080:8080"
    restart: unless-stopped

  # Admin panel (Next.js). Talks to the gateway ONLY over its HTTP API.
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    image: device-gateway-admin:latest
    container_name: device-gateway-admin
    depends_on:
      - fleetiger
    environment:
      - GATEWAY_URL=http://fleetiger:8080
      - GATEWAY_API_TOKEN=${ADMIN_API_TOKEN:?set ADMIN_API_TOKEN in your .env}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in your .env}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-12}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
