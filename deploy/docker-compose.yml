# The multi-unit gateway stack: ONE gateway process hosting every registered unit
# type (see cmd/gateway — howen + fleetiger + cathexis + navtelecom), each on its own port,
# behind one Postgres registry, telemetry webhook, HTTP API, and admin panel.
# Adding a unit is a one-line change in cmd/gateway plus its port mapping below.

# Bound container log files so a chatty device fleet (or DEBUG=1 per-frame logging)
# can't fill the disk and take down Postgres/clip writes. 50 MB × 5 files per
# container. Referenced by every service via `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: device-gateway-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gateway}
      # Required, no default: the gateway DB holds password/API-key hashes, so a
      # weak fallback ("gateway") must never slip into production by omission.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}
      - POSTGRES_DB=${POSTGRES_DB:-gateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway} -d ${POSTGRES_DB:-gateway}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        UNIT: gateway
    image: device-gateway:latest
    container_name: device-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GATEWAY=${GATEWAY:-dfm-gw1.cwe.cloud}
      - LISTEN_HOST=0.0.0.0
      # Per-unit device ports. Each unit declares a default (howen 33000, fleetiger
      # 8050); override here if needed. Keep these in sync with the ports mapping.
      - HOWEN_PORT=${HOWEN_PORT:-33000}
      - FLEETIGER_PORT=${FLEETIGER_PORT:-8050}
      - NAVTELECOM_PORT=${NAVTELECOM_PORT:-4000}
      - JT808_PORT=${JT808_PORT:-6608}
      # Cathexis control port (the device dials it). Media is served on the next
      # two ports (32325 + 32326) — the old gateway's clip-receiver / live-stream
      # split, handled here by one media listener. See the ports mapping below.
      - CATHEXIS_PORT=${CATHEXIS_PORT:-32324}
      # Management/control HTTP API (API-key protected). 0 disables.
      - HTTP_PORT=${HTTP_PORT:-8080}
      # Shared secret the admin panel uses to authenticate (works before any DB
      # API key exists). Same value as the admin's GATEWAY_API_TOKEN.
      - INTERNAL_API_TOKEN=${ADMIN_API_TOKEN:-}
      # Telemetry sink: the universal-JSON endpoint that stores all GPS/event data.
      - DEVICE_WEBHOOK_URL=${DEVICE_WEBHOOK_URL:-}
      # Gateway's own DB — device-verification registry + per-unit settings/mappings.
      - DATABASE_URL=postgres://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}@postgres:5432/${POSTGRES_DB:-gateway}?sslmode=disable
      - DEVICE_AUTH_MODE=${DEVICE_AUTH_MODE:-postgres}
      - DEVICE_REJECT_UNKNOWN=${DEVICE_REJECT_UNKNOWN:-true}
      - MAPPING_REFRESH_SECONDS=${MAPPING_REFRESH_SECONDS:-60}
      # DoS guard: cap concurrent device connections per listener (0 = unlimited).
      # The nofile ulimit below is raised to stay above this.
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-20000}
      - MAX_CONNECTIONS_PER_IP=${MAX_CONNECTIONS_PER_IP:-0}
      # Live video (HLS) for video-capable units (howen). MEDIA_ADVERTISE_HOST is
      # the host devices dial back for media frames (no port); empty DISABLES video.
      - MEDIA_ADVERTISE_HOST=${MEDIA_ADVERTISE_HOST:-}
      - MEDIA_PORT=${MEDIA_PORT:-33001}
      - CLIPS_ROOT=${CLIPS_ROOT:-/var/lib/gateway/clips}
      # Scheduled gateway-DB backups (schedule/retention are editable live in the
      # admin Server Settings; these only seed the defaults on first run).
      - BACKUPS_ROOT=${BACKUPS_ROOT:-/var/lib/gateway/backups}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_TIME=${BACKUP_TIME:-02:00}
      - BACKUP_RETENTION=${BACKUP_RETENTION:-7}
      # Device local-clock offset fallback (a unit's own settings override it, e.g.
      # fleetiger's timezone). 2 for SAST, 0 for UTC.
      - DEVICE_TZ_OFFSET=${DEVICE_TZ_OFFSET:-0}
      # Set DEBUG=1 (or DEBUG=tcp/howen,tcp/fleetiger) for verbose per-frame logging.
      - DEBUG=${DEBUG:-}
    volumes:
      - clipdata:/var/lib/gateway/clips
      - backupdata:/var/lib/gateway/backups
    ports:
      - "33000:33000"  # howen control
      - "33001:33001"  # howen media
      - "8050:8050"    # fleetiger
      - "4000:4000"    # navtelecom
      - "6608:6608"    # jt808 control
      - "6609:6609"    # jt808 media (JT1078 video stream)
      - "${CATHEXIS_PORT:-32324}:${CATHEXIS_PORT:-32324}"            # cathexis control
      - "${VIDEO_LISTEN_PORT:-32325}:${VIDEO_LISTEN_PORT:-32325}"    # cathexis media (clips)
      - "${STREAM_LISTEN_PORT:-32326}:${STREAM_LISTEN_PORT:-32326}"  # cathexis media (live stream)
      - "8080:8080"    # HTTP API
    # Raise the file-descriptor limit above MAX_CONNECTIONS (each device connection,
    # plus ffmpeg pipes and webhook sockets, consumes fds).
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # The distroless image has no shell/curl, so the binary probes its own /healthz
    # (which also verifies DB connectivity). start_period covers first-boot + DB init.
    healthcheck:
      test: ["CMD", "/gateway", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging

  # Admin panel (Next.js). Talks to the gateway ONLY over its HTTP API, using a
  # server-held API key — it has no database access of its own.
  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    image: device-gateway-admin:latest
    container_name: device-gateway-admin
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      - GATEWAY_URL=http://gateway:8080
      - GATEWAY_API_TOKEN=${ADMIN_API_TOKEN:?set ADMIN_API_TOKEN in your .env}
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in your .env}
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-12}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    # Next.js standalone runs on node, so probe with a tiny node one-liner.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/login',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  clipdata:
  backupdata:
